<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1Track.com — Standings</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--red:#E10600;--red2:#FF1801;--darker:#050505;--panel:#0e0e0e;--border:rgba(255,255,255,0.07);--silver:#b0b0b0;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--teal:#00D2BE}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--darker);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden}
.cursor{position:fixed;width:10px;height:10px;background:var(--red);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(225,6,0,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9000}
/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:64px;background:rgba(8,8,8,.96);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;z-index:500;backdrop-filter:blur(12px)}
.nav-icon{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.35);position:relative;text-decoration:none}
.nav-icon:hover,.nav-icon.active{background:rgba(225,6,0,.12);color:var(--red)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:2px;background:var(--red);border-radius:0 2px 2px 0}
.nav-icon svg{width:20px;height:20px}
.sidebar-bottom{margin-top:auto}
.user-avatar{width:38px;height:38px;border-radius:50%;border:2px solid rgba(225,6,0,.4);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;background:rgba(225,6,0,.08);text-decoration:none}
/* TOPBAR */
.topbar{position:fixed;top:0;left:64px;right:0;height:56px;background:rgba(8,8,8,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 24px;z-index:400;backdrop-filter:blur(12px)}
.page-label{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px}.page-label span{color:var(--red)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(225,6,0,.12);border:1px solid rgba(225,6,0,.3);border-radius:100px;padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--red)}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:1px}
/* MAIN */
.main{margin-left:64px;padding-top:56px;min-height:100vh}
.content{padding:28px;display:grid;gap:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* PANELS */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;animation:fadeUp .5s ease both}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--red),transparent)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--border)}
.pt{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px}
.ptag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--red);background:rgba(225,6,0,.1);padding:3px 8px;border-radius:2px}
/* TABS */
.tab-row{display:flex;gap:6px;margin-bottom:0}
.tab-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:7px 18px;border:1px solid rgba(255,255,255,.1);border-radius:2px;background:transparent;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:rgba(255,255,255,.3);color:var(--white)}
.tab-btn.active{border-color:var(--red);color:var(--red);background:rgba(225,6,0,.08)}
/* TABLE */
.standings-table{width:100%}
.st-head{display:grid;align-items:center;gap:8px;padding:8px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.st-head-d{grid-template-columns:36px 28px 1fr 50px repeat(8,48px) 80px}
.st-head-c{grid-template-columns:36px 1fr 50px repeat(8,48px) 80px}
.sh{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.2);text-align:center}
.sh:nth-child(3){text-align:left}
.st-row{display:grid;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;cursor:pointer;animation:fadeUp .5s ease both}
.st-row:hover{background:rgba(255,255,255,.03)}
.st-row-d{grid-template-columns:36px 28px 1fr 50px repeat(8,48px) 80px}
.st-row-c{grid-template-columns:36px 1fr 50px repeat(8,48px) 80px}
.st-pos{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.3);text-align:center}
.st-pos.p1{color:var(--amber)}.st-pos.p2{color:var(--silver)}.st-pos.p3{color:#cd7f32}
.st-change{font-family:'Share Tech Mono',monospace;font-size:10px;text-align:center}
.st-name{display:flex;align-items:center;gap:10px}
.st-flag{font-size:15px}
.st-dname{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}
.st-team{font-size:11px;color:rgba(255,255,255,.3);font-weight:300}
.st-pts{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;text-align:center}
.st-race{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);text-align:center}
.st-race.win{color:var(--amber)}.st-race.pod{color:var(--green)}.st-race.pts{color:var(--teal)}.st-race.dnf{color:var(--red);opacity:.6}
.pts-bar-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.pts-bar{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
/* TEAM COLOR STRIP */
.tc-strip{width:3px;height:100%;border-radius:2px;flex-shrink:0}
/* HERO STAT */
.hero-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;animation:fadeUp .4s ease both}
.hstat{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:18px 20px;position:relative;overflow:hidden}
.hstat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--acc,var(--red)),transparent)}
.hstat-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:8px}
.hstat-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;line-height:1}
.hstat-sub{font-size:13px;color:rgba(255,255,255,.4);margin-top:4px;font-weight:300}
.hstat-badge{position:absolute;top:14px;right:14px;font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px}
.badge-g{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge-a{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- SIDEBAR -->

    <a class="user-avatar" href="login.html">LP</a>

</aside>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:24px">
    <span class="page-label">STAND<span>INGS</span></span>
    <div class="live-badge"><div class="live-dot"></div>2026 — ROUND 7 / 24</div>

<main class="main">
<div class="content">

  <!-- HERO STATS -->
  <div class="hero-stats-row">
    <div class="hstat" style="--acc:var(--amber)">
      <div class="hstat-lbl">DRIVERS LEADER</div>

    </div>

  <!-- TABS + TABLE -->
  <div class="panel">
    <div class="ph">
      <span class="pt" id="tableTitle">DRIVERS CHAMPIONSHIP</span>

        <button class="tab-btn active" id="tabD">DRIVERS</button>
        <button class="tab-btn" id="tabC">CONSTRUCTORS</button>
      </div>
    </div>

</div>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function ar(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar)})();
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.getUTCHours().toString().padStart(2,'0')+':'+n.getUTCMinutes().toString().padStart(2,'0')+':'+n.getUTCSeconds().toString().padStart(2,'0')+' UTC';}
updateClock();setInterval(updateClock,1000);

const TC={
  'Red Bull':'#1E41FF','McLaren':'#FF8000','Ferrari':'#E8002D',
  'Mercedes':'#00D2BE','Williams':'#005AFF','Aston Martin':'#006F62',
  'Alpine':'#0090FF','Haas':'#888888','Racing Bulls':'#4466FF',
  'Kick Sauber':'#52E252','RB':'#4466FF','Sauber':'#52E252'
};
function tc(team){return TC[team]||'#E10600';}
const FLAGS={
  'VER':'🇳🇱','NOR':'🇬🇧','LEC':'🇲🇨','HAM':'🇬🇧','PIA':'🇦🇺',
  'SAI':'🇪🇸','RUS':'🇬🇧','ALO':'🇪🇸','TSU':'🇯🇵','GAS':'🇫🇷',
  'STR':'🇨🇦','HUL':'🇩🇪','MAG':'🇩🇰','OCO':'🇫🇷','BOT':'🇫🇮',
  'ZHO':'🇨🇳','LAW':'🇳🇿','SAR':'🇺🇸','PER':'🇲🇽','BEA':'🇬🇧'
};
function flag(code){return FLAGS[code]||'🏁';}

let currentYear=2026;
let currentMode='drivers';

function loading(){
  document.getElementById('tableWrap').innerHTML=
    '<div style="padding:40px;text-align:center;font-family:Share Tech Mono,monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25)">LOADING DATA...</div>';
}

async function loadDriverStandings(year){
  loading();
  document.getElementById('tableTitle').textContent='DRIVERS CHAMPIONSHIP';
  try{
    const res=await fetch(`/f1/standings/drivers/${year}`);
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    const drivers=data.driver_standings||[];
    if(!drivers.length){
      document.getElementById('tableWrap').innerHTML='<div style="padding:40px;text-align:center;font-family:Share Tech Mono,monospace;font-size:10px;color:rgba(255,255,255,.25)">NO DATA FOR THIS SEASON</div>';
      return;
    }
    const maxPts=drivers[0].points;

    // Update hero stats
    if(drivers[0]){
      document.querySelector('.hstat:nth-child(1) .hstat-val').textContent=drivers[0].code||'---';
      document.querySelector('.hstat:nth-child(1) .hstat-sub').textContent=drivers[0].driver+' · '+drivers[0].team;
      const gap=drivers[0].points-(drivers[1]?.points||0);
      document.querySelector('.hstat:nth-child(1) .hstat-badge').textContent='+'+Math.round(gap)+' PTS';
    }

    document.getElementById('tableWrap').innerHTML=`
      <div class="st-head st-head-d">
        <div class="sh">POS</div><div class="sh">CHG</div>
        <div class="sh" style="text-align:left">DRIVER</div>
        <div class="sh">PTS</div><div class="sh">WINS</div>
        <div class="sh" style="text-align:left;padding-left:6px">POINTS BAR</div>
      </div>
      ${drivers.map((d,i)=>`
      <div class="st-row" style="display:grid;grid-template-columns:36px 28px 1fr 50px 50px 80px;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;cursor:pointer;animation:fadeUp .5s ease both;animation-delay:${i*.03}s">
        <div class="st-pos ${d.position===1?'p1':d.position===2?'p2':d.position===3?'p3':''}">${d.position}</div>
        <div class="st-change" style="font-family:Share Tech Mono,monospace;font-size:10px;text-align:center;color:rgba(255,255,255,.2)">—</div>
        <div class="st-name">
          <div style="width:3px;height:32px;border-radius:2px;background:${tc(d.team)};flex-shrink:0"></div>
          <span class="st-flag">${flag(d.code)}</span>
          <div><div class="st-dname">${d.driver}</div><div class="st-team">${d.team}</div></div>
        </div>
        <div class="st-pts" style="color:${d.position===1?'var(--amber)':'var(--white)'}">${d.points}</div>
        <div class="st-pts" style="font-size:12px;color:rgba(255,255,255,.5)">${d.wins}</div>
        <div style="padding:0 4px"><div class="pts-bar-wrap"><div class="pts-bar" style="background:${tc(d.team)};width:0%" data-w="${Math.round(d.points/maxPts*100)}%"></div></div></div>
      </div>`).join('')}`;
    setTimeout(()=>document.querySelectorAll('.pts-bar[data-w]').forEach(b=>b.style.width=b.dataset.w),200);
  }catch(e){
    document.getElementById('tableWrap').innerHTML=`<div style="padding:40px;text-align:center;color:var(--red);font-family:Share Tech Mono,monospace;font-size:10px">ERROR: ${e.message}</div>`;
  }
}

async function loadConstructorStandings(year){
  loading();
  document.getElementById('tableTitle').textContent='CONSTRUCTORS CHAMPIONSHIP';
  try{
    const res=await fetch(`/f1/standings/constructors/${year}`);
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    const teams=data.constructor_standings||[];
    if(!teams.length){
      document.getElementById('tableWrap').innerHTML='<div style="padding:40px;text-align:center;font-family:Share Tech Mono,monospace;font-size:10px;color:rgba(255,255,255,.25)">NO DATA FOR THIS SEASON</div>';
      return;
    }
    const maxPts=teams[0].points;

    if(teams[0]){
      document.querySelector('.hstat:nth-child(2) .hstat-val').textContent=
        (teams[0].team||'---').split(' ')[0].toUpperCase().slice(0,3);
      document.querySelector('.hstat:nth-child(2) .hstat-sub').textContent=teams[0].team;
      const gap=teams[0].points-(teams[1]?.points||0);
      document.querySelector('.hstat:nth-child(2) .hstat-badge').textContent='+'+Math.round(gap)+' PTS';
    }

    document.getElementById('tableWrap').innerHTML=`
      <div class="st-head st-head-c" style="display:grid;grid-template-columns:36px 1fr 50px 50px 80px;align-items:center;gap:8px;padding:8px 18px;border-bottom:1px solid rgba(255,255,255,.06)">
        <div class="sh">POS</div>
        <div class="sh" style="text-align:left">CONSTRUCTOR</div>
        <div class="sh">PTS</div><div class="sh">WINS</div>
        <div class="sh" style="text-align:left;padding-left:6px">POINTS BAR</div>
      </div>
      ${teams.map((d,i)=>`
      <div class="st-row" style="display:grid;grid-template-columns:36px 1fr 50px 50px 80px;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;cursor:pointer;animation:fadeUp .5s ease both;animation-delay:${i*.04}s">
        <div class="st-pos ${d.position===1?'p1':d.position===2?'p2':d.position===3?'p3':''}">${d.position}</div>
        <div class="st-name">
          <div style="width:3px;height:32px;border-radius:2px;background:${tc(d.team)};flex-shrink:0"></div>
          <div><div class="st-dname">${d.team}</div><div class="st-team">${d.nationality||''}</div></div>
        </div>
        <div class="st-pts" style="color:${d.position===1?'var(--amber)':'var(--white)'}">${d.points}</div>
        <div class="st-pts" style="font-size:12px;color:rgba(255,255,255,.5)">${d.wins}</div>
        <div style="padding:0 4px"><div class="pts-bar-wrap"><div class="pts-bar" style="background:${tc(d.team)};width:0%" data-w="${Math.round(d.points/maxPts*100)}%"></div></div></div>
      </div>`).join('')}`;
    setTimeout(()=>document.querySelectorAll('.pts-bar[data-w]').forEach(b=>b.style.width=b.dataset.w),200);
  }catch(e){
    document.getElementById('tableWrap').innerHTML=`<div style="padding:40px;text-align:center;color:var(--red);font-family:Share Tech Mono,monospace;font-size:10px">ERROR: ${e.message}</div>`;
  }
}

<!-- ═══ AUTH UI: settings removal + profile dropdown · auto-injected ═══ -->
<script>
(function(){
  function init(){
    // 1. Remove any settings (gear) icon — match by SVG content path
    document.querySelectorAll('.sidebar-bottom .nav-icon, aside .nav-icon[title="Settings"], aside a.nav-icon[title="Settings"]').forEach(el=>{
      const svg = el.querySelector('svg');
      if(!svg) return;
      const isGear = /circle cx="12" cy="12" r="3"/.test(svg.outerHTML) &&
                     /M19\.4 15/.test(svg.outerHTML);
      if(isGear) el.remove();
    });

    // 2. User-avatar → clickable, with dropdown
    const av = document.querySelector('.user-avatar');
    if(!av) return;

    // If avatar is an <a>, swap to <div> so we control click
    if(av.tagName === 'A'){
      const div = document.createElement('div');
      div.className = av.className;
      div.style.cssText = av.getAttribute('style') || '';
      div.textContent = av.textContent;
      av.parentNode.replaceChild(div, av);
    }

    const avatar = document.querySelector('.user-avatar');
    avatar.id = avatar.id || 'userAvatar';
    avatar.style.cursor = 'pointer';

    // Set initials from current user
    try {
      const u = JSON.parse(localStorage.getItem('f1_currentUser')||'null');
      if(u){
        const a=(u.firstName||'?').charAt(0), b=(u.lastName||'?').charAt(0);
        avatar.textContent = (a+b).toUpperCase();
      }
    } catch(e){}

    // Make sure parent is positioned for absolute dropdown
    const parent = avatar.closest('.sidebar-bottom') || avatar.parentElement;
    if(parent && getComputedStyle(parent).position === 'static'){
      parent.style.position = 'relative';
    }

    // Build dropdown
    const menu = document.createElement('div');
    menu.id = 'profileMenu';
    menu.style.cssText = 'display:none;position:absolute;left:54px;bottom:0;background:#0e0e0e;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px;min-width:180px;z-index:1000;box-shadow:0 12px 32px rgba(0,0,0,.6)';
    menu.innerHTML = `
      <div id="profileMenuName" style="padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      <button id="logoutBtn" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:transparent;border:none;color:#E10600;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;cursor:pointer;border-radius:4px;text-align:left">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        LOGOUT
      </button>`;
    parent.appendChild(menu);

    avatar.addEventListener('click', e=>{
      e.stopPropagation();
      const open = menu.style.display !== 'none';
      menu.style.display = open ? 'none' : 'block';
      if(!open){
        try {
          const u = JSON.parse(localStorage.getItem('f1_currentUser')||'null');
          document.getElementById('profileMenuName').textContent =
            u ? `${u.firstName||''} ${u.lastName||''} · @${u.username||''}` : 'NOT SIGNED IN';
        } catch(e){
          document.getElementById('profileMenuName').textContent = 'NOT SIGNED IN';
        }
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      localStorage.removeItem('f1_currentUser');
      window.location.href = '/';
    });
    document.addEventListener('click', e=>{
      if(menu.style.display==='none') return;
      if(!menu.contains(e.target) && e.target !== avatar) menu.style.display='none';
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
