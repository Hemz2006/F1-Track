<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1Track.com — Drivers</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--red:#E10600;--red2:#FF1801;--darker:#050505;--panel:#0e0e0e;--border:rgba(255,255,255,0.07);--silver:#b0b0b0;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--teal:#00D2BE}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--darker);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden}
.cursor{position:fixed;width:10px;height:10px;background:var(--red);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(225,6,0,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9000}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:64px;background:rgba(8,8,8,.96);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;z-index:500;backdrop-filter:blur(12px)}
.logo-txt{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;color:var(--red);text-align:center;line-height:1.1;margin-bottom:28px}
.nav-icon{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.35);position:relative}
.nav-icon:hover,.nav-icon.active{background:rgba(225,6,0,.12);color:var(--red)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:2px;background:var(--red);border-radius:0 2px 2px 0}
.nav-icon svg{width:20px;height:20px}
.sidebar-bottom{margin-top:auto}
.user-avatar{width:38px;height:38px;border-radius:50%;border:2px solid rgba(225,6,0,.4);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;background:rgba(225,6,0,.08)}
.topbar{position:fixed;top:0;left:64px;right:0;height:56px;background:rgba(8,8,8,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 24px;z-index:400;backdrop-filter:blur(12px)}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,var(--red),transparent 50%)}
.page-label{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px}
.page-label span{color:var(--red)}
.topbar-right{display:flex;align-items:center;gap:16px}
.clock{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:1px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:rgba(255,255,255,.3);pointer-events:none}
.search-input{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:7px 12px 7px 32px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--white);outline:none;transition:all .2s;width:200px}
.search-input:focus{border-color:rgba(225,6,0,.4);background:rgba(225,6,0,.04)}
.search-input::placeholder{color:rgba(255,255,255,.2)}
.main{margin-left:64px;padding-top:56px;min-height:100vh}
.content{padding:28px;display:grid;gap:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* HERO STATS */
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;animation:fadeUp .5s ease both}
.hs-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:20px 22px;position:relative;overflow:hidden}
.hs-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--ac,var(--red)),transparent)}
.hs-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:10px}
.hs-val{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;line-height:1}
.hs-sub{font-size:13px;color:rgba(255,255,255,.4);margin-top:6px;font-weight:300}
.hs-badge{position:absolute;top:16px;right:16px;font-family:'Share Tech Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px}
.bg{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.ba{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.br{background:rgba(225,6,0,.12);color:var(--red);border:1px solid rgba(225,6,0,.25)}

/* FILTER ROW */
.filter-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;animation:fadeUp .55s ease both}
.pill{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:6px 14px;border:1px solid rgba(255,255,255,.1);border-radius:2px;background:transparent;color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s}
.pill:hover{border-color:rgba(255,255,255,.3);color:var(--white)}
.pill.active{border-color:var(--red);color:var(--red);background:rgba(225,6,0,.08)}
.sort-select{appearance:none;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:4px;padding:6px 28px 6px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--white);outline:none;cursor:pointer;transition:all .2s}
.sort-select option{background:#111}
.res-count{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2);margin-left:auto}

/* GRID */
.drivers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;animation:fadeUp .6s ease both}

/* DRIVER CARD */
.driver-card{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:6px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.driver-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--tc),transparent);opacity:0;transition:opacity .2s}
.driver-card:hover::before,.driver-card.selected::before{opacity:1}
.driver-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.6)}
.driver-card.selected{border-color:rgba(225,6,0,.3);background:rgba(225,6,0,.04)}
.dc-top{padding:18px 18px 14px;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 100%);border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;justify-content:space-between}
.dc-num{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:var(--tc);opacity:.25;line-height:1}
.dc-flag-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.dc-flag{font-size:24px;line-height:1}
.dc-pos-badge{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4)}
.dc-pos-badge.p1{background:rgba(245,158,11,.15);color:var(--amber)}
.dc-pos-badge.p2{background:rgba(176,176,176,.12);color:var(--silver)}
.dc-pos-badge.p3{background:rgba(205,127,50,.12);color:#cd7f32}
.dc-body{padding:12px 18px 16px}
.dc-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;line-height:1.2;margin-bottom:2px}
.dc-team{font-size:12px;color:rgba(255,255,255,.35);font-weight:300;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dc-team-dot{width:6px;height:6px;border-radius:50%}
.dc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dc-stat{background:rgba(0,0,0,.3);border-radius:3px;padding:7px 9px}
.dc-stat-lbl{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:3px}
.dc-stat-val{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700}
.dc-pts-bar-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:10px}
.dc-pts-bar{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}

/* DETAIL PANEL */
.detail-panel{display:none;grid-column:1/-1;background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative;animation:fadeUp .4s ease both}
.detail-panel.open{display:block}
.detail-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--dtc,var(--red)),var(--red2),transparent)}
.dp-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0}
.dp-section{padding:24px;border-right:1px solid var(--border)}
.dp-section:last-child{border-right:none}
.dp-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.25);margin-bottom:14px}
.dp-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;line-height:1.1;margin-bottom:4px}
.dp-team-name{font-size:14px;color:rgba(255,255,255,.4);font-weight:300;margin-bottom:16px}
.dp-bio-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.dp-bio-row:last-child{border-bottom:none}
.dp-bio-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.25)}
.dp-bio-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600}
.dp-big{font-family:'Orbitron',sans-serif;font-size:38px;font-weight:900;line-height:1}
.dp-big-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.25);margin-top:4px}
.season-race-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.src-dot{width:10px;height:10px;border-radius:2px;cursor:pointer;transition:transform .15s}
.src-dot:hover{transform:scale(1.4)}
.src-dot.win{background:var(--amber)}
.src-dot.podium{background:var(--green)}
.src-dot.points{background:rgba(255,255,255,.3)}
.src-dot.retire{background:rgba(225,6,0,.5)}
.src-dot.future{background:rgba(255,255,255,.07)}

/* NO RESULTS */
.no-results{grid-column:1/-1;text-align:center;padding:60px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.15)}
</style>
</head>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:20px">
    <span class="page-label">DRIVER<span>S</span></span>
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(225,6,0,.8);background:rgba(225,6,0,.1);border:1px solid rgba(225,6,0,.25);border-radius:100px;padding:3px 12px">2026 SEASON</div>

<main class="main">
<div class="content">
      <!-- ── FILTER + SORT BAR ── -->
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
        <input id="driverSearch" type="text" placeholder="Search name, team, code..."
               style="flex:1;min-width:200px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
                      border-radius:4px;padding:9px 14px;font-family:Rajdhani,sans-serif;font-size:14px;
                      font-weight:600;color:#f0f0f0;outline:none;transition:border .2s"
               onfocus="this.style.borderColor='rgba(225,6,0,.4)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'">
        <select id="teamFilter" style="appearance:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
                border-radius:4px;padding:9px 14px;font-family:Share Tech Mono,monospace;font-size:10px;
                letter-spacing:1px;color:#f0f0f0;outline:none;cursor:pointer;min-width:160px">
          <option value="">ALL TEAMS</option>
        </select>
        <select id="sortBy" style="appearance:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
                border-radius:4px;padding:9px 14px;font-family:Share Tech Mono,monospace;font-size:10px;

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function ar(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar)})();
const hs=()=>ring.style.transform='translate(-50%,-50%) scale(1.8)';
const hr=()=>ring.style.transform='translate(-50%,-50%) scale(1)';
function updateClock(){const n=new Date();document.getElementById('clock').textContent=n.getUTCHours().toString().padStart(2,'0')+':'+n.getUTCMinutes().toString().padStart(2,'0')+':'+n.getUTCSeconds().toString().padStart(2,'0')+' UTC';}
updateClock();setInterval(updateClock,1000);

const TC={
  'Red Bull':'#1E41FF','McLaren':'#FF8000','Ferrari':'#E8002D',
  'Mercedes':'#00D2BE','Williams':'#005AFF','Aston Martin':'#006F62',
  'Alpine':'#0090FF','Haas':'#888888','Racing Bulls':'#4466FF',
  'Kick Sauber':'#52E252','RB':'#4466FF','Sauber':'#52E252'
};
function tc(team){return TC[team]||'#E10600';}

// Driver number map (static — numbers don't change mid-season)
const NUMBERS={
  'VER':1,'NOR':4,'LEC':16,'HAM':44,'PIA':81,'SAI':55,'RUS':63,
  'ALO':14,'TSU':22,'GAS':10,'STR':18,'HUL':27,'MAG':20,'OCO':31,
  'BOT':77,'ZHO':24,'LAW':30,'SAR':2,'BEA':38,'ANT':12,'HAD':41,
  'PER':11,'DOO':7,'BOR':99
};
const FLAGS={
  'VER':'🇳🇱','NOR':'🇬🇧','LEC':'🇲🇨','HAM':'🇬🇧','PIA':'🇦🇺',
  'SAI':'🇪🇸','RUS':'🇬🇧','ALO':'🇪🇸','TSU':'🇯🇵','GAS':'🇫🇷',
  'STR':'🇨🇦','HUL':'🇩🇪','MAG':'🇩🇰','OCO':'🇫🇷','BOT':'🇫🇮',
  'ZHO':'🇨🇳','LAW':'🇳🇿','SAR':'🇺🇸','PER':'🇲🇽','BEA':'🇬🇧',
  'ANT':'🇦🇷','HAD':'🇳🇿','DOO':'🇦🇺'
};
function flag(code){return FLAGS[code]||'🏁';}

let allDrivers=[];

// ── Load from API ─────────────────────────────────────────────────────────────
async function loadDrivers(year=2026){
  const grid=document.getElementById('driversGrid');
  if(grid) grid.innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;font-family:Share Tech Mono,monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.25)">LOADING DRIVERS...</div>';
  try{
    const res=await fetch(`/f1/standings/drivers/${year}`);
    if(!res.ok) throw new Error(await res.text());
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    allDrivers=(data.driver_standings||[]).map(d=>({
      ...d, number: NUMBERS[d.code]||'—'
    }));
    populateTeamFilter(allDrivers);
    applyFilters();
  }catch(e){
    if(grid) grid.innerHTML=`<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--red);font-family:Share Tech Mono,monospace;font-size:10px">⚠ ${e.message}</div>`;
  }
}

// ── Populate team filter dropdown ─────────────────────────────────────────────
function populateTeamFilter(drivers){
  const sel=document.getElementById('teamFilter');
  if(!sel) return;
  const teams=[...new Set(drivers.map(d=>d.team).filter(Boolean))].sort();
  // Remove old options except "ALL TEAMS"
  while(sel.options.length>1) sel.remove(1);
  teams.forEach(t=>{
    const o=document.createElement('option');
    o.value=t; o.textContent=t.toUpperCase();
    sel.appendChild(o);
  });
}

// ── Filter + Sort ─────────────────────────────────────────────────────────────
function applyFilters(){
  const q=(document.getElementById('driverSearch')?.value||'').toLowerCase().trim();
  const teamFilter=(document.getElementById('teamFilter')?.value||'').toLowerCase();
  const sortBy=document.getElementById('sortBy')?.value||'position';

  let filtered=allDrivers.filter(d=>{
    const matchSearch=!q||(
      d.driver.toLowerCase().includes(q)||
      (d.team||'').toLowerCase().includes(q)||
      (d.code||'').toLowerCase().includes(q)||
      String(d.number).includes(q)
    );
    const matchTeam=!teamFilter||(d.team||'').toLowerCase()===teamFilter;
    return matchSearch && matchTeam;
  });

  filtered=[...filtered].sort((a,b)=>{
    if(sortBy==='points')   return b.points-a.points;
    if(sortBy==='wins')     return b.wins-a.wins;
    if(sortBy==='name')     return a.driver.localeCompare(b.driver);
    return a.position-b.position; // default: championship position
  });

  renderDrivers(filtered);
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderDrivers(drivers){
  const grid=document.getElementById('driversGrid');
  if(!grid) return;
  if(!drivers.length){
    grid.innerHTML='<div style="grid-column:1/-1;padding:40px;text-align:center;font-family:Share Tech Mono,monospace;font-size:10px;color:rgba(255,255,255,.25)">NO DRIVERS MATCH YOUR FILTER</div>';
    return;
  }
  grid.innerHTML=drivers.map((d,i)=>`
    <div style="background:#0e0e0e;border:1px solid rgba(255,255,255,.06);border-radius:5px;
                overflow:hidden;position:relative;animation:fadeUp .5s ease both;animation-delay:${i*.03}s;
                transition:all .2s;cursor:pointer"
         onmouseenter="this.style.transform='translateY(-3px)';this.style.borderColor='${tc(d.team)}55'"
         onmouseleave="this.style.transform='';this.style.borderColor='rgba(255,255,255,.06)'">
      <!-- top colour bar -->
      <div style="height:2px;background:linear-gradient(to right,${tc(d.team)},transparent)"></div>
      <!-- big position watermark -->
      <div style="position:absolute;top:10px;right:12px;font-family:Orbitron,sans-serif;
                  font-size:36px;font-weight:900;color:rgba(255,255,255,.05);line-height:1">P${d.position}</div>
      <div style="padding:16px">
        <!-- header row -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
          <div style="width:3px;height:40px;background:${tc(d.team)};border-radius:2px;flex-shrink:0"></div>
          <div style="font-size:26px">${flag(d.code)}</div>
          <div>
            <div style="font-family:Rajdhani,sans-serif;font-size:17px;font-weight:700;line-height:1.1">${d.driver}</div>
            <div style="font-family:Share Tech Mono,monospace;font-size:9px;letter-spacing:2px;
                        color:rgba(255,255,255,.35);margin-top:3px">#${d.number} · ${d.code||''}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:2px">${d.team}</div>
          </div>
        </div>
        <!-- stats grid -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
          <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
                      border-radius:4px;padding:8px 6px;text-align:center">
            <div style="font-family:Orbitron,sans-serif;font-size:16px;font-weight:700;
                        color:${d.position===1?'var(--amber)':'#f0f0f0'}">${d.points}</div>
            <div style="font-family:Share Tech Mono,monospace;font-size:7px;letter-spacing:1px;
                        color:rgba(255,255,255,.25);margin-top:2px">PTS</div>
          </div>
          <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
                      border-radius:4px;padding:8px 6px;text-align:center">
            <div style="font-family:Orbitron,sans-serif;font-size:16px;font-weight:700;
                        color:${d.wins>0?'var(--amber)':'#f0f0f0'}">${d.wins}</div>
            <div style="font-family:Share Tech Mono,monospace;font-size:7px;letter-spacing:1px;
                        color:rgba(255,255,255,.25);margin-top:2px">WINS</div>
          </div>
          <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
                      border-radius:4px;padding:8px 6px;text-align:center">
            <div style="font-family:Orbitron,sans-serif;font-size:16px;font-weight:700">${d.number}</div>
            <div style="font-family:Share Tech Mono,monospace;font-size:7px;letter-spacing:1px;
                        color:rgba(255,255,255,.25);margin-top:2px">NUMBER</div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

// ── Wire up controls ──────────────────────────────────────────────────────────
document.getElementById('driverSearch')?.addEventListener('input', applyFilters);
document.getElementById('teamFilter')?.addEventListener('change', applyFilters);
document.getElementById('sortBy')?.addEventListener('change', applyFilters);

loadDrivers(2026);
</script>
<!-- ═══ AUTH UI: settings removal + profile dropdown · auto-injected ═══ -->
<script>
(function(){
  function init(){
    // 1. Remove any settings (gear) icon — match by SVG content path
    document.querySelectorAll('.sidebar-bottom .nav-icon, aside .nav-icon[title="Settings"], aside a.nav-icon[title="Settings"]').forEach(el=>{
      const svg = el.querySelector('svg');
      if(!svg) return;
      const isGear = /circle cx="12" cy="12" r="3"/.test(svg.outerHTML) &&
                     /M19\.4 15/.test(svg.outerHTML);
      if(isGear) el.remove();
    });

    // 2. User-avatar → clickable, with dropdown
    const av = document.querySelector('.user-avatar');
    if(!av) return;

    // If avatar is an <a>, swap to <div> so we control click
    if(av.tagName === 'A'){
      const div = document.createElement('div');
      div.className = av.className;
      div.style.cssText = av.getAttribute('style') || '';
      div.textContent = av.textContent;
      av.parentNode.replaceChild(div, av);
    }

    const avatar = document.querySelector('.user-avatar');
    avatar.id = avatar.id || 'userAvatar';
    avatar.style.cursor = 'pointer';

    // Set initials from current user
    try {
      const u = JSON.parse(localStorage.getItem('f1_currentUser')||'null');
      if(u){
        const a=(u.firstName||'?').charAt(0), b=(u.lastName||'?').charAt(0);
        avatar.textContent = (a+b).toUpperCase();
      }
    } catch(e){}

    // Make sure parent is positioned for absolute dropdown
    const parent = avatar.closest('.sidebar-bottom') || avatar.parentElement;
    if(parent && getComputedStyle(parent).position === 'static'){
      parent.style.position = 'relative';
    }

    // Build dropdown
    const menu = document.createElement('div');
    menu.id = 'profileMenu';
    menu.style.cssText = 'display:none;position:absolute;left:54px;bottom:0;background:#0e0e0e;border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:6px;min-width:180px;z-index:1000;box-shadow:0 12px 32px rgba(0,0,0,.6)';
    menu.innerHTML = `
      <div id="profileMenuName" style="padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.4);border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      <button id="logoutBtn" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:transparent;border:none;color:#E10600;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1.5px;cursor:pointer;border-radius:4px;text-align:left">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        LOGOUT
      </button>`;
    parent.appendChild(menu);

    avatar.addEventListener('click', e=>{
      e.stopPropagation();
      const open = menu.style.display !== 'none';
      menu.style.display = open ? 'none' : 'block';
      if(!open){
        try {
          const u = JSON.parse(localStorage.getItem('f1_currentUser')||'null');
          document.getElementById('profileMenuName').textContent =
            u ? `${u.firstName||''} ${u.lastName||''} · @${u.username||''}` : 'NOT SIGNED IN';
        } catch(e){
          document.getElementById('profileMenuName').textContent = 'NOT SIGNED IN';
        }
      }
    });
    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      localStorage.removeItem('f1_currentUser');
      window.location.href = '/';
    });
    document.addEventListener('click', e=>{
      if(menu.style.display==='none') return;
      if(!menu.contains(e.target) && e.target !== avatar) menu.style.display='none';
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
